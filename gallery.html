<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Gallery - Travel Guide</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
body{
    background:#f8f9fa;
}

.gallery-grid{
    columns:3;
    column-gap:12px;
}

.gallery-item{
    break-inside:avoid;
    margin-bottom:12px;
    cursor:pointer;
    overflow:hidden;
    border-radius:8px;
    position:relative;
}

.gallery-item img{
    width:100%;
    display:block;
    transition:transform 0.3s;
}

.gallery-item:hover img{
    transform:scale(1.04);
}

.gallery-item .overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.4);
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    transition:0.3s;
    font-size:1.2rem;
}

.gallery-item:hover .overlay{
    opacity:1;
}

@media (max-width:768px){
    .gallery-grid{
        columns:2;
    }
}

@media (max-width:480px){
    .gallery-grid{
        columns:1;
    }
}
</style>
</head>
<body>

<div class="container py-5 text-center">
    <h1>Travel Gallery</h1>
    <p class="text-muted">Explore beautiful moments from around the city.</p>
</div>

<div class="container text-center mb-4">
    <button class="btn btn-primary" onclick="filterGallery('all')">All</button>
    <button class="btn btn-outline-primary" onclick="filterGallery('landscape')">Landscapes</button>
    <button class="btn btn-outline-primary" onclick="filterGallery('architecture')">Architecture</button>
    <button class="btn btn-outline-primary" onclick="filterGallery('food')">Food</button>
    <button class="btn btn-outline-primary" onclick="filterGallery('people')">People</button>
</div>

<div class="container">
    <div class="gallery-grid">

        <div class="gallery-item" data-category="landscape">
            <img src="https://picsum.photos/500/700?1" alt="Landscape View" loading="lazy" onclick="openModal(0)">
            <div class="overlay">View</div>
        </div>

        <div class="gallery-item" data-category="architecture">
            <img src="https://picsum.photos/500/600?2" alt="Architecture" loading="lazy" onclick="openModal(1)">
            <div class="overlay">View</div>
        </div>

        <div class="gallery-item" data-category="food">
            <img src="https://picsum.photos/500/800?3" alt="Food" loading="lazy" onclick="openModal(2)">
            <div class="overlay">View</div>
        </div>

        <div class="gallery-item" data-category="people">
            <img src="https://picsum.photos/500/650?4" alt="People" loading="lazy" onclick="openModal(3)">
            <div class="overlay">View</div>
        </div>

        <div class="gallery-item" data-category="landscape">
            <img src="https://picsum.photos/500/900?5" alt="Landscape" loading="lazy" onclick="openModal(4)">
            <div class="overlay">View</div>
        </div>

        <div class="gallery-item" data-category="architecture">
            <img src="https://picsum.photos/500/750?6" alt="Architecture" loading="lazy" onclick="openModal(5)">
            <div class="overlay">View</div>
        </div>

    </div>
</div>

<!-- Modal -->
<div class="modal fade" id="galleryModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Image Preview</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body text-center">
                <img id="modal-img" class="img-fluid rounded">
                <p class="mt-3" id="modal-caption"></p>

                <div class="d-flex justify-content-between">
                    <button class="btn btn-secondary" onclick="prevImage()">Previous</button>
                    <button class="btn btn-secondary" onclick="nextImage()">Next</button>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
let currentIndex = 0;
let visibleImages = [...document.querySelectorAll('.gallery-item img')];

function openModal(index){
    currentIndex = index;
    updateModalImage();

    const modal = new bootstrap.Modal(
        document.getElementById('galleryModal')
    );

    modal.show();
}

function updateModalImage(){
    const img = visibleImages[currentIndex];
    document.getElementById('modal-img').src = img.src;
    document.getElementById('modal-caption').textContent = img.alt;
}

function nextImage(){
    currentIndex = (currentIndex + 1) % visibleImages.length;
    updateModalImage();
}

function prevImage(){
    currentIndex = (currentIndex - 1 + visibleImages.length) % visibleImages.length;
    updateModalImage();
}

function filterGallery(category){
    const items = document.querySelectorAll('.gallery-item');

    items.forEach(item => {
        item.style.display =
            category === 'all' || item.dataset.category === category
            ? 'block'
            : 'none';
    });

    visibleImages = [
        ...document.querySelectorAll(
            '.gallery-item:not([style*="none"]) img'
        )
    ];
}

document.addEventListener('keydown', function(e){
    if(!document.getElementById('galleryModal').classList.contains('show')) return;

    if(e.key === 'ArrowRight') nextImage();
    if(e.key === 'ArrowLeft') prevImage();
});
</script>

</body>
</html>
