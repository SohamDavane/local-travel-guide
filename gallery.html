<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Gallery - Travel Guide</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
body{
    background:#f8f9fa;
}

.gallery-grid{
    columns:3;
    column-gap:12px;
}

.gallery-item{
    break-inside:avoid;
    margin-bottom:12px;
    overflow:hidden;
    border-radius:10px;
    cursor:pointer;
    position:relative;
}

.gallery-item img{
    width:100%;
    display:block;
    transition:transform .3s;
}

.gallery-item:hover img{
    transform:scale(1.04);
}

.gallery-item::after{
    content:"🔍 View";
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background:rgba(0,0,0,.4);
    color:white;
    opacity:0;
    transition:.3s;
}

.gallery-item:hover::after{
    opacity:1;
}

@media(max-width:768px){
.gallery-grid{
columns:2;
}
}

@media(max-width:480px){
.gallery-grid{
columns:1;
}
}
</style>
</head>
<body>

<div class="container py-5 text-center">
    <h1>Travel Gallery</h1>
    <p class="text-muted">Explore beautiful travel moments</p>
</div>

<div class="container text-center mb-4">
    <button class="btn btn-primary filter-btn" onclick="filterGallery('all')">All</button>
    <button class="btn btn-outline-primary filter-btn" onclick="filterGallery('landscape')">Landscapes</button>
    <button class="btn btn-outline-primary filter-btn" onclick="filterGallery('architecture')">Architecture</button>
    <button class="btn btn-outline-primary filter-btn" onclick="filterGallery('food')">Food</button>
    <button class="btn btn-outline-primary filter-btn" onclick="filterGallery('people')">People</button>
</div>

<div class="container">
<div class="gallery-grid">

<div class="gallery-item" data-category="architecture">
<img src="https://picsum.photos/id/1015/600/900" alt="Architecture" loading="lazy" onclick="openModal(0)">
</div>

<div class="gallery-item" data-category="landscape">
<img src="https://picsum.photos/id/1025/600/700" alt="Landscape" loading="lazy" onclick="openModal(1)">
</div>

<div class="gallery-item" data-category="food">
<img src="https://picsum.photos/id/1080/600/800" alt="Food" loading="lazy" onclick="openModal(2)">
</div>

<div class="gallery-item" data-category="people">
<img src="https://picsum.photos/id/1005/600/850" alt="People" loading="lazy" onclick="openModal(3)">
</div>

<div class="gallery-item" data-category="architecture">
<img src="https://picsum.photos/id/1040/600/750" alt="Architecture" loading="lazy" onclick="openModal(4)">
</div>

<div class="gallery-item" data-category="landscape">
<img src="https://picsum.photos/id/1039/600/950" alt="Landscape" loading="lazy" onclick="openModal(5)">
</div>

<div class="gallery-item" data-category="food">
<img src="https://picsum.photos/id/1060/600/800" alt="Food" loading="lazy" onclick="openModal(6)">
</div>

<div class="gallery-item" data-category="people">
<img src="https://picsum.photos/id/1074/600/780" alt="People" loading="lazy" onclick="openModal(7)">
</div>

</div>
</div>

<div class="modal fade" id="galleryModal" tabindex="-1">
<div class="modal-dialog modal-lg modal-dialog-centered">
<div class="modal-content">

<div class="modal-header">
<h5 class="modal-title">Gallery Image</h5>
<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body text-center">
<img id="modal-img" class="img-fluid rounded">
<p class="mt-3" id="modal-caption"></p>

<div class="d-flex justify-content-between mt-3">
<button class="btn btn-secondary" onclick="prevImage()">Previous</button>
<button class="btn btn-secondary" onclick="nextImage()">Next</button>
</div>

</div>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
let currentIndex = 0;
let visibleImages = [];

function openModal(index){
    currentIndex=index;
    updateModalImage();
    new bootstrap.Modal(document.getElementById('galleryModal')).show();
}

function updateModalImage(){
    const img=visibleImages[currentIndex];
    document.getElementById('modal-img').src=img.src;
    document.getElementById('modal-caption').textContent=img.alt;
}

function nextImage(){
    currentIndex=(currentIndex+1)%visibleImages.length;
    updateModalImage();
}

function prevImage(){
    currentIndex=(currentIndex-1+visibleImages.length)%visibleImages.length;
    updateModalImage();
}

function filterGallery(category){

    document.querySelectorAll('.filter-btn').forEach(btn=>{
        btn.classList.remove('btn-primary');
        btn.classList.add('btn-outline-primary');
    });

    event.target.classList.remove('btn-outline-primary');
    event.target.classList.add('btn-primary');

    const items=document.querySelectorAll('.gallery-item');

    items.forEach(item=>{
        if(category==='all' || item.dataset.category===category){
            item.style.display='block';
        }else{
            item.style.display='none';
        }
    });

    visibleImages=[...document.querySelectorAll('.gallery-item:not([style*="none"]) img')];
}

document.addEventListener('keydown',function(e){
    if(!document.getElementById('galleryModal').classList.contains('show')) return;

    if(e.key==='ArrowRight') nextImage();
    if(e.key==='ArrowLeft') prevImage();
});

visibleImages=[...document.querySelectorAll('.gallery-item img')];
</script>

</body>
</html>
