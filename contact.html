<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact & Booking - MumbaiGuide</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
body{
    background:#f8f9fa;
}

.booking-card{
    background:#ffffff;
    border-radius:12px;
    box-shadow:0 4px 18px rgba(0,0,0,0.06);
    padding:2.5rem;
}

.section-label{
    font-size:0.78rem;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:#0d6efd;
    font-weight:600;
}

.btn-accent{
    background:#0d6efd;
    border:none;
}

.btn-accent:hover{
    background:#0b5ed7;
}

#success-message{
    display:none;
}

.char-counter{
    font-size:0.8rem;
    color:#6c757d;
}
</style>
</head>
<body>

<div class="container py-5 text-center">
    <p class="section-label mb-1">Plan your trip</p>
    <h1>Contact &amp; Booking</h1>
    <p class="text-muted">Tell us where in Mumbai you want to go, and we'll take care of the rest.</p>
</div>

<div class="container" style="max-width:720px;">
    <div class="booking-card">

        <form id="bookingForm" novalidate>

            <div class="mb-3">
                <label for="name" class="form-label">Full Name</label>
                <input type="text" class="form-control" id="name" placeholder="e.g. Soham Davane" required>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" placeholder="you@example.com" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="phone" class="form-label">Phone <span class="text-muted">(optional)</span></label>
                    <input type="tel" class="form-control" id="phone" placeholder="10-digit number">
                </div>
            </div>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label for="travelers" class="form-label">Travelers</label>
                    <input type="number" class="form-control" id="travelers" min="1" value="1" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label for="from-date" class="form-label">From</label>
                    <input type="date" class="form-control" id="from-date" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label for="to-date" class="form-label">To</label>
                    <input type="date" class="form-control" id="to-date" required>
                </div>
            </div>

            <div class="mb-2">
                <label for="message" class="form-label">Tell us more</label>
                <textarea class="form-control" id="message" rows="4" maxlength="500" placeholder="Places you want to cover, pace, budget, anything else..."></textarea>
            </div>
            <div class="text-end char-counter mb-3">
                <span id="charCount">0</span>/500
            </div>

            <button type="submit" class="btn btn-accent text-white w-100 py-2">
                <i class="bi bi-send-fill me-1"></i> Send Request
            </button>

        </form>

        <div id="success-message" class="alert alert-success mt-4 mb-0">
            <i class="bi bi-check-circle-fill"></i>
            Thanks, <strong id="success-name"></strong>! We've received your request and will reach out shortly.
        </div>

    </div>
</div>

<div class="py-5"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/form-validate.js"></script>

</body>
</html>
