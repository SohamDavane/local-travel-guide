<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Trip Itinerary Planner</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #4facfe, #00f2fe);
            min-height: 100vh;
        }

        .main-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-top: 30px;
            box-shadow: 0px 10px 25px rgba(0, 0, 0, 0.2);
        }

        .hero {
            background: linear-gradient(135deg, #007bff, #00c6ff);
            color: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            margin-bottom: 30px;
        }

        .hero h1 {
            font-size: 3rem;
            font-weight: bold;
        }

        .summary-box {
            background: #e9f7ff;
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
        }

        .card {
            border-radius: 15px;
        }

        .btn {
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="main-card">

            <div class="hero">
                <h1>🌍 Trip Itinerary Planner</h1>
                <p>Create your perfect travel schedule day by day</p>
            </div>

            <div class="mb-3">
                <label class="form-label">📍 Destination</label>
                <input type="text"
                    id="destination"
                    class="form-control"
                    placeholder="Enter destination">
            </div>

            <div class="mb-3">
                <label class="form-label">🗓 Number of Days</label>
                <input type="number"
                    id="days"
                    class="form-control"
                    min="1"
                    max="14">
            </div>

            <button onclick="createTrip()"
                class="btn btn-primary btn-lg w-100">
                  Create My Trip
            </button>

            <div class="summary-box">

                <h4>📊 Trip Summary</h4>

                <p id="total-days">
                    Total Days: 0
                </p>

                <p id="total-activities">
                    Total Activities: 0
                </p>

                <button onclick="exportPlan()"
                    class="btn btn-success">
                    📤 Export Plan
                </button>

            </div>

            <div id="planner-container" class="mt-4"></div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
