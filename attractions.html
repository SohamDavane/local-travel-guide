<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attractions — MumbaiGuide</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <!-- Custom styles -->
  <link href="assets/css/main.css" rel="stylesheet">
  <link href="assets/css/animations.css" rel="stylesheet">
</head>
<body>

  <!-- NAVBAR (shared component) -->
  <div id="navbar-placeholder"></div>

  <!-- PAGE HEADER -->
  <section class="bg-primary text-white text-center section-padded">
    <div class="container">
      <h1>Explore Attractions</h1>
      <p class="lead mb-0">66 places to see, eat, and explore across Mumbai</p>
    </div>
  </section>

  <!-- FILTER BUTTONS -->
  <section class="container pt-4">
    <div class="d-flex flex-wrap justify-content-center gap-2" role="group" aria-label="Filter attractions by category">
      <button type="button" class="btn btn-outline-primary filter-btn active" data-category="all">
        All
      </button>
      <button type="button" class="btn btn-outline-primary filter-btn" data-category="historical">
        <i class="bi bi-bank"></i> Historical
      </button>
      <button type="button" class="btn btn-outline-primary filter-btn" data-category="nature">
        <i class="bi bi-tree"></i> Nature
      </button>
      <button type="button" class="btn btn-outline-primary filter-btn" data-category="food">
        <i class="bi bi-egg-fried"></i> Food
      </button>
      <button type="button" class="btn btn-outline-primary filter-btn" data-category="shopping">
        <i class="bi bi-bag"></i> Shopping
      </button>
      <button type="button" class="btn btn-outline-primary filter-btn" data-category="adventure">
        <i class="bi bi-compass"></i> Adventure
      </button>
      <button type="button" class="btn btn-outline-primary filter-btn" data-category="sightseeing">
        <i class="bi bi-binoculars"></i> Sightseeing
      </button>
    </div>
  </section>

  <!-- STATUS / ERROR MESSAGE (hidden unless loading fails) -->
  <div class="container mt-4">
    <div id="attractions-status" class="alert alert-warning d-none" role="alert"></div>
  </div>

  <!-- EMPTY STATE (hidden unless a filter returns zero results) -->
  <div class="container mt-4">
    <div id="attractions-empty" class="text-center text-muted py-5 d-none">
      <i class="bi bi-emoji-frown fs-1"></i>
      <p class="mt-2 mb-0">No attractions found in this category yet.</p>
    </div>
  </div>

  <!-- CARD GRID -->
  <section class="container my-4">
    <div class="row" id="attractions-grid">
      <!-- Cards are injected here by assets/js/attractions.js -->
      <div class="col-12 text-center text-muted py-5" id="attractions-loading">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Loading attractions…</span>
        </div>
        <p class="mt-2">Loading attractions…</p>
      </div>
    </div>
  </section>

  <!-- FOOTER (shared component) -->
  <div id="footer-placeholder"></div>

  <!-- Bootstrap JS bundle (includes Popper) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Shared navbar/footer loader + active link highlighter -->
  <script src="assets/js/navbar.js"></script>
  <!-- Page-specific logic -->
  <script src="assets/js/attractions.js"></script>

</body>
</html>
